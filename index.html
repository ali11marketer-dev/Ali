<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أدوات الذكاء الاصطناعي</title>

    <style>
        body {
            font-family: "Tahoma", sans-serif;
            background: #f5f5f5;
            margin: 0;
            padding: 0;
        }

        header {
            background: #4a90e2;
            color: white;
            padding: 30px 15px;
            text-align: center;
        }

        header h1 {
            margin: 0 0 10px;
            font-size: 24px;
        }

        header p {
            margin: 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .tools {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 15px;
            padding: 20px 15px 40px;
            max-width: 1100px;
            margin: auto;
        }

        .tool-card {
            background: white;
            padding: 18px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            cursor: pointer;
            transition: 0.25s;
            border: 1px solid #eee;
        }

        .tool-card h3 {
            margin: 0 0 8px;
            font-size: 18px;
            color: #333;
        }

        .tool-card p {
            margin: 0;
            font-size: 13px;
            color: #666;
        }

        .tool-card:hover {
            transform: translateY(-4px);
            background: #eaf2ff;
            border-color: #4a90e2;
        }

        footer {
            text-align: center;
            font-size: 12px;
            color: #888;
            padding: 10px 0 20px;
        }
    </style>
</head>

<body>

    <header>
        <h1>أدوات الذكاء الاصطناعي
